name: Live enquiry R19 browser check

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/live-enquiry-r18-check.yml

permissions:
  contents: read

jobs:
  verify-live-direct-delivery:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Wait for GitHub Pages
        run: sleep 75
      - name: Submit a labelled enquiry through the live browser fallback
        run: |
          cat > /tmp/live-enquiry-check.js <<'JS'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({headless:true});
            try {
              const page = await browser.newPage({viewport:{width:390,height:844}});
              let backendCalls = 0;
              let directCalls = 0;
              const providerResponses = [];
              await page.route('https://itrdesk-payment-backend.vercel.app/api/enquiry', async route => {
                backendCalls += 1;
                await route.fulfill({status:503,contentType:'application/json',body:JSON.stringify({error:'Automatic enquiry delivery is temporarily unavailable.'})});
              });
              page.on('request', request => {
                if (request.url().startsWith('https://formsubmit.co/ajax/')) directCalls += 1;
              });
              page.on('response', async response => {
                if (response.url().startsWith('https://formsubmit.co/ajax/')) {
                  providerResponses.push({status:response.status(),url:response.url(),body:await response.text().catch(()=> '')});
                }
              });
              await page.goto('https://siddharthvbhatia-blip.github.io/itrdesk/?enquiry=live-r19', {waitUntil:'networkidle'});
              await page.waitForFunction(() => document.querySelector('#itrForm')?.dataset.reliableEnquiry === 'r19', null, {timeout:30000});
              const scriptSource = await page.locator('script[src*="enquiry-delivery-r19.js"]').getAttribute('src');
              await page.locator('input[name="name"]').fill('ITR Desk Live System Test');
              await page.locator('input[name="phone"]').fill('9876543210');
              await page.locator('select[name="caseType"]').selectOption({label:'Not sure'});
              await page.locator('textarea[name="note"]').fill('Automated live delivery verification. No response required.');
              await page.locator('input[name="consent"]').check();
              await page.locator('#itrForm button[type="submit"]').click();
              await page.locator('#enquiryStatus.success').waitFor({timeout:35000});
              const text = await page.locator('#enquiryStatus').innerText();
              const fallbackHidden = await page.locator('#enquiryFallback').evaluate(el => el.hidden);
              console.log(JSON.stringify({scriptSource,backendCalls,directCalls,providerResponses,text,fallbackHidden},null,2));
              if (!scriptSource.includes('enquiry-delivery-r19.js?v=20260718-r19')) throw new Error(`Unexpected script: ${scriptSource}`);
              if (backendCalls !== 2) throw new Error(`Expected 2 backend calls, got ${backendCalls}`);
              if (directCalls < 1) throw new Error('Direct provider was not called');
              if (!/ENQ-[0-9]{8}-[A-F0-9]{6}/.test(text)) throw new Error('No enquiry reference shown');
              if (!fallbackHidden) throw new Error('WhatsApp fallback should remain hidden');
              console.log('PASS live website R19 direct enquiry fallback');
            } finally { await browser.close(); }
          })().catch(error => { console.error(error); process.exit(1); });
          JS
          node /tmp/live-enquiry-check.js
