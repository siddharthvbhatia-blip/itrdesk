name: Live enquiry R21 browser check

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/live-enquiry-r18-check.yml

permissions:
  contents: read

jobs:
  verify-live-whatsapp-handoff:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Verify the published R21 handoff
        run: |
          cat > live-enquiry-r21.js <<'JS'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({headless:true});
            try {
              let report;
              for (let attempt = 1; attempt <= 20; attempt += 1) {
                const page = await browser.newPage({viewport:{width:390,height:844}});
                await page.addInitScript(() => { window.ITRDeskDisableAutoWhatsApp = true; });
                let backendCalls = 0;
                await page.route('https://itrdesk-payment-backend.vercel.app/api/enquiry', async route => {
                  backendCalls += 1;
                  await route.fulfill({status:503,contentType:'application/json',body:JSON.stringify({error:'Secure delivery is temporarily unavailable.'})});
                });
                try {
                  await page.goto(`https://siddharthvbhatia-blip.github.io/itrdesk/?enquiry=live-r21-${attempt}`, {waitUntil:'networkidle'});
                  const version = await page.locator('#itrForm').getAttribute('data-reliable-enquiry');
                  const script = await page.locator('script[src*="enquiry-handoff-r21.js"]').getAttribute('src').catch(() => null);
                  if (version !== 'r21' || !script) {
                    await page.close();
                    await new Promise(resolve => setTimeout(resolve, 15000));
                    continue;
                  }
                  await page.locator('input[name="name"]').fill('ITR Desk Live System Test');
                  await page.locator('input[name="phone"]').fill('9876543210');
                  await page.locator('select[name="caseType"]').selectOption({label:'Not sure'});
                  await page.locator('textarea[name="note"]').fill('Automated live handoff verification. No response required.');
                  await page.locator('input[name="consent"]').check();
                  await page.locator('#itrForm button[type="submit"]').click();
                  await page.locator('#enquiryStatus.handoff').waitFor({timeout:15000});
                  const text = await page.locator('#enquiryStatus').innerText();
                  const href = await page.locator('#enquiryFallback').getAttribute('href');
                  const visible = await page.locator('#enquiryFallback').isVisible();
                  report = {attempt,version,script,backendCalls,text,href,visible};
                  console.log(JSON.stringify(report,null,2));
                  if (backendCalls !== 2) throw new Error(`Expected 2 backend attempts, got ${backendCalls}`);
                  if (!/WA-[0-9]{8}-[A-F0-9]{6}/.test(text)) throw new Error('No WhatsApp reference shown');
                  if (!/Tap Send there to complete it/.test(text)) throw new Error('Completion instruction is missing');
                  if (/not configured/i.test(text)) throw new Error('Old configuration error is still visible');
                  if (!visible || !href.startsWith('https://wa.me/917879857126?text=')) throw new Error('Prepared WhatsApp link is missing');
                  console.log('PASS live R21 enquiry handoff');
                  await page.close();
                  return;
                } catch (error) {
                  await page.close();
                  if (attempt === 20) throw error;
                  await new Promise(resolve => setTimeout(resolve, 15000));
                }
              }
              throw new Error('R21 was not published in time');
            } finally { await browser.close(); }
          })().catch(error => { console.error(error); process.exit(1); });
          JS
          node live-enquiry-r21.js
