name: Live enquiry R19 browser diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/live-enquiry-r18-check.yml

permissions:
  contents: read

jobs:
  diagnose-live-direct-delivery:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Capture direct-provider behaviour from the published page
        run: |
          mkdir -p live-diagnostics
          cat > /tmp/live-enquiry-diagnostic.js <<'JS'
          const fs = require('fs');
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({headless:true});
            const result = { backendCalls:0, directCalls:0, providerResponses:[], failedRequests:[], consoleMessages:[] };
            try {
              const page = await browser.newPage({viewport:{width:390,height:844}});
              await page.route('https://itrdesk-payment-backend.vercel.app/api/enquiry', async route => {
                result.backendCalls += 1;
                await route.fulfill({status:503,contentType:'application/json',body:JSON.stringify({error:'Automatic enquiry delivery is temporarily unavailable.'})});
              });
              page.on('request', request => {
                if (request.url().startsWith('https://formsubmit.co/ajax/')) result.directCalls += 1;
              });
              page.on('requestfailed', request => result.failedRequests.push({url:request.url(),failure:request.failure()}));
              page.on('console', message => result.consoleMessages.push({type:message.type(),text:message.text()}));
              page.on('response', async response => {
                if (response.url().startsWith('https://formsubmit.co/ajax/')) {
                  result.providerResponses.push({status:response.status(),url:response.url(),headers:await response.allHeaders(),body:await response.text().catch(()=> '')});
                }
              });
              await page.goto('https://siddharthvbhatia-blip.github.io/itrdesk/?enquiry=diagnostic-r19-artifact', {waitUntil:'networkidle'});
              await page.waitForFunction(() => document.querySelector('#itrForm')?.dataset.reliableEnquiry === 'r19', null, {timeout:30000});
              result.scriptSource = await page.locator('script[src*="enquiry-delivery-r19.js"]').getAttribute('src');
              await page.locator('input[name="name"]').fill('ITR Desk Live Diagnostic');
              await page.locator('input[name="phone"]').fill('9876543210');
              await page.locator('select[name="caseType"]').selectOption({label:'Not sure'});
              await page.locator('textarea[name="note"]').fill('Automated diagnostic. No response required.');
              await page.locator('input[name="consent"]').check();
              await page.locator('#itrForm button[type="submit"]').click();
              await page.waitForTimeout(18000);
              result.text = await page.locator('#enquiryStatus').innerText();
              result.statusClass = await page.locator('#enquiryStatus').getAttribute('class');
              result.fallbackHidden = await page.locator('#enquiryFallback').evaluate(el => el.hidden);
              await page.screenshot({path:'live-diagnostics/live-enquiry.png',fullPage:true});
            } catch (error) {
              result.error = {name:error.name,message:error.message,stack:error.stack};
            } finally {
              fs.writeFileSync('live-diagnostics/diagnostic.json', JSON.stringify(result,null,2));
              console.log(JSON.stringify(result,null,2));
              await browser.close();
            }
          })();
          JS
          node /tmp/live-enquiry-diagnostic.js
      - name: Upload live provider diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-enquiry-provider-diagnostic
          path: live-diagnostics
          if-no-files-found: error
          retention-days: 3
