name: Live profile photo smoke test

on:
  push:
    branches: [main]
    paths:
      - index.html
      - about-ca-siddharth-bhatia.html
      - assets/profile-photo.css
      - test/run-tests.js
      - .github/workflows/live-profile-photo-smoke.yml
  pull_request:
    branches: [main]
    paths:
      - index.html
      - about-ca-siddharth-bhatia.html
      - assets/profile-photo.css
      - test/run-tests.js
      - .github/workflows/live-profile-photo-smoke.yml
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read

jobs:
  verify-live-site:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - name: Wait for GitHub Pages and verify published portrait bytes
        env:
          BUILD_SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          import base64
          import os
          import re
          import time
          import urllib.request

          base = 'https://siddharthvbhatia-blip.github.io/itrdesk/'
          targets = [
              ('index.html', 1),
              ('about-ca-siddharth-bhatia.html', 2),
          ]
          build = os.environ.get('BUILD_SHA', 'manual')
          last_error = None

          for attempt in range(1, 31):
              try:
                  for page, minimum in targets:
                      url = f'{base}{page}?profile-smoke={build}-{attempt}'
                      request = urllib.request.Request(url, headers={
                          'User-Agent': 'ITR-Desk-live-smoke-test/1.0',
                          'Cache-Control': 'no-cache',
                      })
                      with urllib.request.urlopen(request, timeout=20) as response:
                          if response.status != 200:
                              raise AssertionError(f'{page} returned HTTP {response.status}')
                          html = response.read().decode('utf-8')
                      matches = re.findall(r'src="data:image/jpeg;base64,([^\"]+)"', html)
                      if len(matches) < minimum:
                          raise AssertionError(f'{page} has {len(matches)} embedded portrait(s), expected at least {minimum}')
                      for encoded in matches:
                          raw = base64.b64decode(encoded, validate=True)
                          if not raw.startswith(b'\xff\xd8\xff') or len(raw) <= 5000:
                              raise AssertionError(f'{page} contains an invalid embedded JPEG portrait')
                      if 'src="assets/ca-siddharth-bhatia-profile' in html:
                          raise AssertionError(f'{page} still depends on a separately served profile image')
                  print('PASS live GitHub Pages profile photo smoke test')
                  raise SystemExit(0)
              except Exception as error:
                  last_error = error
                  print(f'Attempt {attempt}/30 not ready: {error}')
                  if attempt < 30:
                      time.sleep(30)

          raise SystemExit(f'Live profile photo smoke test failed after retries: {last_error}')
          PY
