name: Apply known-good profile photo restoration

on:
  push:
    branches: [agent/restore-known-good-photo-r9]
    paths:
      - scripts/restore-known-good-profile-photo.py
      - .github/workflows/apply-known-good-profile-photo.yml
  pull_request:
    branches: [main]
    paths:
      - scripts/restore-known-good-profile-photo.py
      - .github/workflows/apply-known-good-profile-photo.yml

permissions:
  contents: write

jobs:
  restore-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: python -m pip install --disable-pip-version-check pillow
      - name: Restore original browser-proven portrait
        run: python scripts/restore-known-good-profile-photo.py
      - name: Decode and inspect original portrait
        run: |
          python - <<'PY'
          from PIL import Image, ImageStat
          image = Image.open('assets/ca-siddharth-bhatia.jpeg').convert('RGB')
          image.load()
          assert image.width >= 300 and image.height >= 300, image.size
          variance = ImageStat.Stat(image).var
          assert max(variance) > 100, variance
          print('Portrait format:', image.format, 'size:', image.size, 'variance:', variance)
          PY
      - run: npm run check
      - run: npm test
      - name: Commit tested restoration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/restore-known-good-profile-photo.py .github/workflows/apply-known-good-profile-photo.yml
          git add index.html about-ca-siddharth-bhatia.html assets/profile-photo.css assets/script.js package.json test/profile-photo-known-good.js .github/workflows/live-profile-photo-smoke.yml
          git commit -m "Restore browser-proven profile photo with fallback checks"
          git push origin HEAD:$TARGET_BRANCH
