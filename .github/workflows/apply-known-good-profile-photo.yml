name: Apply known-good profile photo restoration

on:
  pull_request:
    branches: [main]
    paths:
      - scripts/restore-known-good-profile-photo.py
      - scripts/remove-obsolete-inline-photo-tests.py
      - .github/workflows/apply-known-good-profile-photo.yml

permissions:
  contents: write

concurrency:
  group: known-good-profile-photo-r9
  cancel-in-progress: true

jobs:
  restore-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_BRANCH: agent/restore-known-good-photo-r9
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/restore-known-good-photo-r9
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: python -m pip install --disable-pip-version-check pillow
      - name: Restore original browser-proven portrait
        run: python scripts/restore-known-good-profile-photo.py
      - name: Replace obsolete inline-photo tests
        run: python scripts/remove-obsolete-inline-photo-tests.py
      - name: Decode and inspect original portrait
        run: |
          python - <<'PY'
          from PIL import Image, ImageStat
          image = Image.open('assets/ca-siddharth-bhatia.jpeg').convert('RGB')
          image.load()
          assert image.width >= 300 and image.height >= 300, image.size
          variance = ImageStat.Stat(image).var
          assert max(variance) > 100, variance
          print('Portrait size:', image.size, 'variance:', variance)
          PY
      - run: npm run check
      - run: npm test
      - name: Commit only tested website files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html about-ca-siddharth-bhatia.html assets/profile-photo.css assets/script.js package.json test/run-tests.js test/profile-photo-known-good.js
          git commit -m "Restore browser-proven profile photo with fallback checks"
          git push origin HEAD:agent/restore-known-good-photo-r9
