name: Live concise website monitor

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/live-mobile-layout-browser.yml
  push:
    branches: [main]
    paths:
      - index.html
      - about-ca-siddharth-bhatia.html
      - assets/styles.css
      - assets/profile-photo.css
      - assets/phase1.css
      - assets/clean-v2.css
      - assets/script.js
      - assets/profile-runtime-r14.js
      - assets/ca-siddharth-bhatia-final-r16.jpg
      - test/clean-site-r17.js
      - test/mobile-layout-browser.js
      - test/desktop-profile-browser-r16.js
      - .github/workflows/live-mobile-layout-browser.yml
  schedule:
    - cron: '43 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-live-clean-site:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run concise source checks
        run: node test/clean-site-r17.js
      - name: Install Chromium test runtime
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Wait for GitHub Pages and verify public concise pages
        env:
          BASE_URL: https://siddharthvbhatia-blip.github.io/itrdesk
        run: |
          for attempt in $(seq 1 30); do
            echo "Live concise-site check attempt ${attempt}/30"
            if node test/mobile-layout-browser.js && node test/desktop-profile-browser-r16.js; then
              exit 0
            fi
            sleep 20
          done
          exit 1
      - name: Upload live clean-site diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-clean-site-diagnostics
          path: test-results
          if-no-files-found: warn
          retention-days: 7
