name: Apply phase-one static content

on:
  push:
    branches: [main]
    paths:
      - scripts/apply-phase1-static.py
      - .github/workflows/apply-phase1-static.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: python scripts/apply-phase1-static.py
      - run: npm run check
      - run: npm test
      - name: Commit static content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/apply-phase1-static.py .github/workflows/apply-phase1-static.yml
          git add -A
          if git diff --cached --quiet; then
            echo "No static changes required"
          else
            git commit -m "Apply phase-one static content updates"
            git push
          fi
