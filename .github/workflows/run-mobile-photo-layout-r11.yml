name: Run mobile portrait repair

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/run-mobile-photo-layout-r11.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mobile-photo-layout-r11
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply source repair
        run: python scripts/apply-mobile-photo-layout-r11.py
      - name: Run checks
        run: |
          npm run check
          npm test
      - name: Commit repair branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html about-ca-siddharth-bhatia.html assets/profile-photo.css assets/phase1.css assets/mobile-layout-r11.css assets/script.js package.json test/mobile-layout-r11.js test/mobile-layout-browser-r11.js
          git commit -m "Fix circular portraits and mobile content overlap"
          git push origin HEAD:agent/mobile-photo-layout-r11
