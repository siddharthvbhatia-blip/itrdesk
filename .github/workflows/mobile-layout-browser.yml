name: Website portrait, theme, enquiry, contact and private inbox checks

on:
  pull_request:
    branches: [main]
    paths:
      - index.html
      - privacy.html
      - about-ca-siddharth-bhatia.html
      - admin-inbox.html
      - assets/ca-siddharth-bhatia-final-r16.jpg
      - assets/ca-india-logo-r22.webp
      - assets/favicon-ca-r23.svg
      - assets/styles.css
      - assets/profile-photo.css
      - assets/phase1.css
      - assets/clean-v2.css
      - assets/blue-white-r22.css
      - assets/admin-inbox-r23.css
      - assets/admin-inbox-r23.js
      - assets/script.js
      - assets/profile-runtime-r14.js
      - assets/enquiry-handoff-r21.js
      - test/final-profile-r16.js
      - test/clean-site-r17.js
      - test/enquiry-handoff-r21.js
      - test/enquiry-browser-r21.js
      - test/blue-white-logo-r22.js
      - test/blue-white-browser-r22.js
      - test/enquiry-inbox-r23.js
      - test/enquiry-inbox-browser-r23.js
      - test/home-contact-r24.js
      - test/home-contact-browser-r24.js
      - test/portrait-visual-proof-r16.py
      - test/mobile-layout-browser.js
      - test/desktop-profile-browser-r16.js
      - .github/workflows/mobile-layout-browser.yml
  push:
    branches: [main]
    paths:
      - index.html
      - privacy.html
      - about-ca-siddharth-bhatia.html
      - admin-inbox.html
      - assets/ca-siddharth-bhatia-final-r16.jpg
      - assets/ca-india-logo-r22.webp
      - assets/favicon-ca-r23.svg
      - assets/styles.css
      - assets/profile-photo.css
      - assets/phase1.css
      - assets/clean-v2.css
      - assets/blue-white-r22.css
      - assets/admin-inbox-r23.css
      - assets/admin-inbox-r23.js
      - assets/script.js
      - assets/profile-runtime-r14.js
      - assets/enquiry-handoff-r21.js
      - test/final-profile-r16.js
      - test/clean-site-r17.js
      - test/enquiry-handoff-r21.js
      - test/enquiry-browser-r21.js
      - test/blue-white-logo-r22.js
      - test/blue-white-browser-r22.js
      - test/enquiry-inbox-r23.js
      - test/enquiry-inbox-browser-r23.js
      - test/home-contact-r24.js
      - test/home-contact-browser-r24.js
      - test/portrait-visual-proof-r16.py
      - test/mobile-layout-browser.js
      - test/desktop-profile-browser-r16.js
      - .github/workflows/mobile-layout-browser.yml

permissions:
  contents: read

jobs:
  chromium-clean-site:
    runs-on: ubuntu-latest
    timeout-minutes: 28
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify portrait contains visible photographic content
        run: |
          python -m pip install --disable-pip-version-check pillow
          python test/portrait-visual-proof-r16.py
      - name: Run content, enquiry, logo, favicon, contact and inbox source checks
        run: |
          node test/clean-site-r17.js
          node test/enquiry-handoff-r21.js
          node test/blue-white-logo-r22.js
          node test/enquiry-inbox-r23.js
          node test/home-contact-r24.js
      - name: Install Chromium test runtime
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Start local website
        run: |
          python3 -m http.server 4173 >/tmp/itrdesk-http.log 2>&1 &
          sleep 2
          curl --fail --silent http://127.0.0.1:4173/index.html >/dev/null
          curl --fail --silent http://127.0.0.1:4173/admin-inbox.html >/dev/null
      - name: Verify concise mobile pages in Chromium
        env:
          BASE_URL: http://127.0.0.1:4173
        run: node test/mobile-layout-browser.js
      - name: Verify concise desktop pages in Chromium
        env:
          BASE_URL: http://127.0.0.1:4173
        run: node test/desktop-profile-browser-r16.js
      - name: Verify CA logo and blue-white theme in Chromium
        env:
          BASE_URL: http://127.0.0.1:4173
        run: node test/blue-white-browser-r22.js
      - name: Verify homepage office contact details in Chromium
        env:
          BASE_URL: http://127.0.0.1:4173
        run: node test/home-contact-browser-r24.js
      - name: Verify private enquiry inbox and favicon in Chromium
        env:
          BASE_URL: http://127.0.0.1:4173
        run: node test/enquiry-inbox-browser-r23.js
      - name: Verify secure retry, WhatsApp handoff and validation errors
        env:
          BASE_URL: http://127.0.0.1:4173
        run: node test/enquiry-browser-r21.js
      - name: Upload site diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-contact-inbox-favicon-diagnostics
          path: test-results
          if-no-files-found: warn
          retention-days: 7
