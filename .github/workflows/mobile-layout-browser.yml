name: Concise website portrait, layout and enquiry checks

on:
  pull_request:
    branches: [main]
    paths:
      - index.html
      - privacy.html
      - about-ca-siddharth-bhatia.html
      - assets/ca-siddharth-bhatia-final-r16.jpg
      - assets/styles.css
      - assets/profile-photo.css
      - assets/phase1.css
      - assets/clean-v2.css
      - assets/script.js
      - assets/profile-runtime-r14.js
      - assets/enquiry-reliability-r18.js
      - test/final-profile-r16.js
      - test/clean-site-r17.js
      - test/enquiry-reliability-r18.js
      - test/enquiry-browser-r18.js
      - test/portrait-visual-proof-r16.py
      - test/mobile-layout-browser.js
      - test/desktop-profile-browser-r16.js
      - .github/workflows/mobile-layout-browser.yml
  push:
    branches: [main]
    paths:
      - index.html
      - privacy.html
      - about-ca-siddharth-bhatia.html
      - assets/ca-siddharth-bhatia-final-r16.jpg
      - assets/styles.css
      - assets/profile-photo.css
      - assets/phase1.css
      - assets/clean-v2.css
      - assets/script.js
      - assets/profile-runtime-r14.js
      - assets/enquiry-reliability-r18.js
      - test/final-profile-r16.js
      - test/clean-site-r17.js
      - test/enquiry-reliability-r18.js
      - test/enquiry-browser-r18.js
      - test/portrait-visual-proof-r16.py
      - test/mobile-layout-browser.js
      - test/desktop-profile-browser-r16.js
      - .github/workflows/mobile-layout-browser.yml

permissions:
  contents: read

jobs:
  chromium-clean-site:
    runs-on: ubuntu-latest
    timeout-minutes: 24
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify portrait contains visible photographic content
        run: |
          python -m pip install --disable-pip-version-check pillow
          python test/portrait-visual-proof-r16.py
      - name: Run concise content and enquiry source checks
        run: |
          node test/clean-site-r17.js
          node test/enquiry-reliability-r18.js
      - name: Install Chromium test runtime
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Start local website
        run: |
          python3 -m http.server 4173 >/tmp/itrdesk-http.log 2>&1 &
          sleep 2
          curl --fail --silent http://127.0.0.1:4173/index.html >/dev/null
      - name: Verify concise mobile pages in Chromium
        env:
          BASE_URL: http://127.0.0.1:4173
        run: node test/mobile-layout-browser.js
      - name: Verify concise desktop pages in Chromium
        env:
          BASE_URL: http://127.0.0.1:4173
        run: node test/desktop-profile-browser-r16.js
      - name: Verify enquiry retry, success and fallback in Chromium
        env:
          BASE_URL: http://127.0.0.1:4173
        run: node test/enquiry-browser-r18.js
      - name: Verify deployed backend returns a real enquiry reference
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/enquiry-reliability-r18'
        run: |
          for attempt in $(seq 1 8); do
            response_file=$(mktemp)
            status=$(curl --silent --show-error --output "$response_file" --write-out '%{http_code}' \
              --request POST 'https://itrdesk-payment-backend.vercel.app/api/enquiry' \
              --header 'Origin: https://siddharthvbhatia-blip.github.io' \
              --header 'Content-Type: application/json' \
              --data '{"name":"ITR Desk End-to-End Test","mobile":"9876543210","email":"","city":"","caseType":"Not sure","details":[],"note":"Automated end-to-end delivery verification. No response required.","consent":true,"website":"","source":"ITR Desk website pull request smoke test"}')
            body=$(cat "$response_file")
            rm -f "$response_file"
            echo "HTTP $status: $body"
            if [ "$status" = "200" ] && echo "$body" | grep -Eq '"reference":"ENQ-[0-9]{8}-[A-F0-9]{6}"'; then
              echo 'PASS deployed backend returned a delivery reference'
              exit 0
            fi
            sleep 20
          done
          exit 1
      - name: Upload site diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clean-site-enquiry-diagnostics
          path: test-results
          if-no-files-found: warn
          retention-days: 7
