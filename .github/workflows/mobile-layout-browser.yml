name: Profile portrait and layout browser checks

on:
  pull_request:
    branches: [main]
    paths:
      - index.html
      - about-ca-siddharth-bhatia.html
      - assets/ca-siddharth-bhatia-final-r16.jpg
      - assets/styles.css
      - assets/profile-photo.css
      - assets/phase1.css
      - assets/script.js
      - assets/profile-runtime-r14.js
      - test/final-profile-r16.js
      - test/portrait-visual-proof-r16.py
      - test/mobile-layout-browser.js
      - test/desktop-profile-browser-r16.js
      - .github/workflows/mobile-layout-browser.yml
  push:
    branches: [main]
    paths:
      - index.html
      - about-ca-siddharth-bhatia.html
      - assets/ca-siddharth-bhatia-final-r16.jpg
      - assets/styles.css
      - assets/profile-photo.css
      - assets/phase1.css
      - assets/script.js
      - assets/profile-runtime-r14.js
      - test/final-profile-r16.js
      - test/portrait-visual-proof-r16.py
      - test/mobile-layout-browser.js
      - test/desktop-profile-browser-r16.js
      - .github/workflows/mobile-layout-browser.yml

permissions:
  contents: read

jobs:
  chromium-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify final portrait contains visible photographic content
        run: |
          python -m pip install --disable-pip-version-check pillow
          python test/portrait-visual-proof-r16.py
      - name: Install Chromium test runtime
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Start local website
        run: |
          python3 -m http.server 4173 >/tmp/itrdesk-http.log 2>&1 &
          sleep 2
          curl --fail --silent http://127.0.0.1:4173/index.html >/dev/null
      - name: Verify mobile portrait and layout in Chromium
        env:
          BASE_URL: http://127.0.0.1:4173
        run: node test/mobile-layout-browser.js
      - name: Verify desktop portrait and separation in Chromium
        env:
          BASE_URL: http://127.0.0.1:4173
        run: node test/desktop-profile-browser-r16.js
      - name: Upload profile and layout diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profile-layout-diagnostics
          path: test-results
          if-no-files-found: warn
          retention-days: 7
