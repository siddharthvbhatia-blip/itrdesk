name: Paid download site validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check browser JavaScript syntax
        run: |
          node --check assets/payment.js
          node --check assets/itr-preparation.js
      - name: Validate paid download pages
        run: python3 scripts/validate-paid-downloads.py