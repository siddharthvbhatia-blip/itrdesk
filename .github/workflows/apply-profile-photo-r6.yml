name: Apply profile photo multilayer fix

on:
  push:
    branches: [agent/profile-photo-multilayer-fix-r6]
    paths:
      - scripts/apply-profile-multilayer-fix.py
      - scripts/upgrade-profile-fix-to-svg.py
      - .github/workflows/apply-profile-photo-r6.yml
  pull_request:
    branches: [main]
    paths:
      - scripts/apply-profile-multilayer-fix.py
      - scripts/upgrade-profile-fix-to-svg.py
      - .github/workflows/apply-profile-photo-r6.yml

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: python -m pip install --disable-pip-version-check pillow
      - name: Upgrade repair to SVG fallback
        run: python scripts/upgrade-profile-fix-to-svg.py
      - name: Apply multilayer photo fix
        run: python scripts/apply-profile-multilayer-fix.py
      - name: Decode JPEG and generated SVG fallback
        run: |
          python - <<'PY'
          from io import BytesIO
          import base64
          import re
          from pathlib import Path
          from PIL import Image

          jpg = Image.open('assets/ca-siddharth-bhatia-profile-v3.jpg')
          jpg.load()
          assert jpg.size[0] >= 192 and jpg.size[1] >= 192, jpg.size

          svg = Path('assets/ca-siddharth-bhatia-profile-fallback.svg').read_text(encoding='utf-8')
          match = re.search(r'data:image/jpeg;base64,([^\"]+)', svg)
          assert match, 'SVG fallback has no embedded JPEG'
          embedded = base64.b64decode(match.group(1), validate=True)
          fallback = Image.open(BytesIO(embedded))
          fallback.load()
          assert fallback.size[0] >= 192 and fallback.size[1] >= 192, fallback.size
          print('JPEG', jpg.size, 'SVG embedded JPEG', fallback.size)
          PY
      - run: npm run check
      - run: npm test
      - name: Commit tested fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/apply-profile-multilayer-fix.py scripts/upgrade-profile-fix-to-svg.py .github/workflows/apply-profile-photo-r6.yml
          git rm -f docs/profile-photo* docs/.keep-profile-fix 2>/dev/null || true
          git add index.html about-ca-siddharth-bhatia.html assets/ca-siddharth-bhatia-profile-fallback.svg assets/profile-photo.css assets/script.js package.json test/profile-photo-assets.js .github/workflows/live-profile-photo-smoke.yml
          git commit -m "Use browser-safe profile photo fallbacks and live decode checks"
          git push origin HEAD:$TARGET_BRANCH
